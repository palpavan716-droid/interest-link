<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Request Form</title>
</head>
<body>
<h1>Tell Us What You're Planning</h1>

<form>
<label>Name:</label><br>
<input type="text" placeholder="Mr. XX"><br><br>

<label>I'm Interested In:</label><br>
<select>
<option>Family Lunch</option>
<option>Family Dinner</option>
<option>Birthday Celebration</option>
<option>Anniversary Celebration</option>
<option>Corporate Lunch</option>
<option>Corporate Dinner</option>
<option>Wedding Function</option>
<option>Engagement Ceremony</option>
<option>Reception</option>
<option>Private Dining Room</option>
<option>Catering Service</option>
<option>Conference / Meeting</option>
<option>Other</option>
</select><br><br>

<label>Preferred Event Date:</label><br>
<input type="date"><br><br>

<label>Expected Guests (PAX):</label><br>
<input type="number"><br><br>

<label>Budget Range:</label><br>
<input type="text"><br><br>

<label>Special Requirements:</label><br>
<textarea rows="5"></textarea><br><br>

<button type="submit">Submit Request</button>
</form>

</body>
</html>
