<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DineFlowBook - Send Interest</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:#fff;
border-radius:25px;
padding:35px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo h1{
color:#0f172a;
font-size:32px;
}

.logo p{
color:#64748b;
margin-top:5px;
}

.form-title{
text-align:center;
margin-bottom:25px;
}

.form-title h2{
color:#111827;
margin-bottom:8px;
}

.form-title p{
color:#6b7280;
}

label{
display:block;
margin-top:15px;
font-weight:600;
color:#1f2937;
}

input,select,textarea{
width:100%;
padding:14px;
margin-top:8px;
border:1px solid #d1d5db;
border-radius:12px;
font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
outline:none;
border-color:#2563eb;
}

.submit-btn{
width:100%;
margin-top:25px;
background:#2563eb;
color:white;
border:none;
padding:15px;
font-size:16px;
font-weight:600;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.submit-btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#6b7280;
}

.badge{
background:#dbeafe;
color:#1d4ed8;
padding:6px 12px;
border-radius:30px;
display:inline-block;
font-size:13px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<div class="badge">DineFlowBook</div>
<h1>Send Interest</h1>
<p>Tell us what you're planning</p>
</div>

<div class="form-title">
<h2>Event Inquiry Form</h2>
<p>Please fill out the details below</p>
</div>

<form id="interestForm">

<label>Guest Name *</label>
<input type="text" id="name" required>

<label>Mobile Number *</label>
<input type="tel" id="phone" required>

<label>I'm Interested In *</label>
<select id="event">
<option>Family Lunch</option>
<option>Family Dinner</option>
<option>Birthday Celebration</option>
<option>Anniversary Celebration</option>
<option>Corporate Lunch</option>
<option>Corporate Dinner</option>
<option>Wedding Function</option>
<option>Engagement Ceremony</option>
<option>Reception</option>
<option>Private Dining Room</option>
<option>Buffet Experience</option>
<option>Catering Service</option>
<option>Conference / Meeting</option>
<option>Other</option>
</select>

<label>Preferred Event Date *</label>
<input type="date" id="date">

<label>Expected Guests (PAX)</label>
<input type="number" id="pax">

<label>Special Requirements</label>
<textarea rows="4" id="remarks"></textarea>

<button type="submit" class="submit-btn">
Send Interest
</button>

</form>

<div class="footer">
Powered by DineFlowBook
</div>

</div>

<script>
document.getElementById("interestForm")
.addEventListener("submit", function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let event=document.getElementById("event").value;
let date=document.getElementById("date").value;
let pax=document.getElementById("pax").value;
let remarks=document.getElementById("remarks").value;

let msg=
`*NEW INTEREST LEAD*%0A%0A`+
`Name: ${name}%0A`+
`Phone: ${phone}%0A`+
`Event: ${event}%0A`+
`Date: ${date}%0A`+
`Guests: ${pax}%0A`+
`Remarks: ${remarks}`;

window.open(
`https://wa.me/9002884401?text=${msg}`,
'_blank'
);

});
</script>

</body>
</html>
