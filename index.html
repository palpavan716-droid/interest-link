<div class="container">

<h1>Tell Us What You're Planning</h1>

<p class="subtitle">
Hi Mr./Ms. Guest, please fill out the details below so we can assist you better.
</p>

<form>

<label>I'm Interested In *</label>

<select required>
<option value="">Select Event Type</option>
<option>Family Lunch</option>
<option>Family Dinner</option>
<option>Birthday Celebration</option>
<option>Anniversary Celebration</option>
<option>Corporate Lunch</option>
<option>Corporate Dinner</option>
<option>Kitty Party</option>
<option>Wedding Function</option>
<option>Engagement Ceremony</option>
<option>Reception</option>
<option>Private Dining Room</option>
<option>Buffet Experience</option>
<option>Catering Service</option>
<option>Conference / Meeting</option>
<option>Other</option>
</select>

<label>Preferred Event Date</label>
<input type="date">

<label>Expected Guests (PAX)</label>
<input type="number" placeholder="e.g. 50">

<label>Budget Range</label>
<input type="text" placeholder="e.g. ₹25,000 - ₹50,000">

<label>Special Requirements / Notes</label>

<textarea rows="5" placeholder="Tell us more about your ideas, dietary restrictions, or specific needs..."></textarea>

<button type="submit">
Submit Request
</button>

</form>

</div>
